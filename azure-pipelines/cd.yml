parameters:
  - name: deployEnv
    displayName: "Environment"
    type: string
    default: dev
    values:
      - dev
      - prod

trigger:
  branches:
    include:
      - main
pr: none

stages:
- stage: BuildAndPush
  displayName: Build and Push Docker Image to ECR (main)
  jobs:
  - job: DockerBuildAndPush
    displayName: Build and Push
    pool:
      name: onprem

    variables:
      - group: aws-access

    steps:
    - checkout: self
      clean: true

    # 1) Compute repo + tag
    - script: |
        set -e

        ENV_NAME="${{ parameters.deployEnv }}"

        # Safety check
        case "$ENV_NAME" in
          dev|prod) ;;
          *)
            echo "ERROR: invalid ENV_NAME=$ENV_NAME"
            exit 1
            ;;
        esac

        ECR_REPO="ayahay-email-api-${ENV_NAME}"

        DOCKER_TAG="build-$BUILD_BUILDID"
        SHORT_SHA="$(echo $BUILD_SOURCEVERSION | cut -c1-7)"

        echo "Resolved:"
        echo "  ENV_NAME=$ENV_NAME"
        echo "  ECR_REPO=$ECR_REPO"
        echo "  DOCKER_TAG=$DOCKER_TAG"
        echo "  SHORT_SHA=$SHORT_SHA"

        echo "##vso[task.setvariable variable=ENV_NAME]$ENV_NAME"
        echo "##vso[task.setvariable variable=ECR_REPO]$ECR_REPO"
        echo "##vso[task.setvariable variable=DOCKER_TAG]$DOCKER_TAG"
        echo "##vso[task.setvariable variable=SHORT_SHA]$SHORT_SHA"
      displayName: "Compute ECR repo + immutable tag"

    # 2) Build & push to ECR
    - script: |
        set -e

        AWS_REGION="ap-southeast-2"
        AWS_ACCOUNT="861789509630"
        REGISTRY="$AWS_ACCOUNT.dkr.ecr.$AWS_REGION.amazonaws.com"

        echo "Logging into ECR..."
        aws ecr get-login-password --region "$AWS_REGION" \
          | docker login --username AWS --password-stdin "$REGISTRY"

        echo "Building Docker image..."
        docker build -t "$ECR_REPO:$DOCKER_TAG" -f Dockerfile .

        echo "Tagging..."
        docker tag "$ECR_REPO:$DOCKER_TAG" "$REGISTRY/$ECR_REPO:$DOCKER_TAG"
        docker tag "$ECR_REPO:$DOCKER_TAG" "$REGISTRY/$ECR_REPO:$SHORT_SHA"

        echo "Pushing..."
        docker push "$REGISTRY/$ECR_REPO:$DOCKER_TAG"
        docker push "$REGISTRY/$ECR_REPO:$SHORT_SHA"

        # Optional: also push latest (don't deploy latest)
        docker tag "$ECR_REPO:$DOCKER_TAG" "$REGISTRY/$ECR_REPO:latest"
        docker push "$REGISTRY/$ECR_REPO:latest"
      displayName: "Build and Push Docker Image"
      env:
        AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
        AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
        AWS_DEFAULT_REGION: ap-southeast-2

    # 3) Capture digest and produce image-info.json
    - script: |
        set -e

        AWS_REGION="ap-southeast-2"
        AWS_ACCOUNT="861789509630"
        REGISTRY="$AWS_ACCOUNT.dkr.ecr.$AWS_REGION.amazonaws.com"

        echo "Fetching pushed image digest..."
        IMAGE_DIGEST=$(aws ecr describe-images \
          --repository-name "$ECR_REPO" \
          --image-ids imageTag="$DOCKER_TAG" \
          --query 'imageDetails[0].imageDigest' \
          --output text)

        IMAGE_URI="$REGISTRY/${ECR_REPO}@${IMAGE_DIGEST}"

        mkdir -p release-artifacts
        cat > release-artifacts/image-info.json <<EOF
        {
          "IMAGE_URI": "$IMAGE_URI",
          "environment": "$ENV_NAME",
          "ecrRepo": "$ECR_REPO",
          "dockerTag": "$DOCKER_TAG"
        }
        EOF

        echo "Generated image-info.json:"
        cat release-artifacts/image-info.json
      displayName: "Generate image-info.json"
      env:
        AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
        AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
        AWS_DEFAULT_REGION: ap-southeast-2

    # 4) Publish artifacts for Release pipeline
    - task: PublishPipelineArtifact@1
      displayName: "Publish release artifacts"
      inputs:
        targetPath: "release-artifacts"
        artifact: "Ayahay-Email-API"
        publishLocation: "pipeline"